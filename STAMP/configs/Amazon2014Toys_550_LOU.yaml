# Data
root: ../../data
dataset: Amazon2014Toys_550_LOU

# Model
maxlen: 50
embedding_dim: 64
hidden_size: 64
loss: CE

# Training
epochs: 200
batch_size: 512
optimizer: adam
lr: 5.e-3
weight_decay: 1.e-4

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
