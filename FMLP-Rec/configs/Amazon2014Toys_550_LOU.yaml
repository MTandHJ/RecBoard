# Data
root: ../../data
dataset: Amazon2014Toys_550_LOU

# Model
maxlen: 50
embedding_dim: 64
num_blocks: 4
num_heads: 2
hidden_act: gelu
hidden_dropout_rate: 0.3
loss: BPR

# Training
epochs: 300
batch_size: 512
optimizer: adam
lr: 1.e-4
weight_decay: 0.

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
