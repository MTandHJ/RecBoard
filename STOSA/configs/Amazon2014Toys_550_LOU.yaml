# Data
root: ../../data
dataset: Amazon2014Toys_550_LOU

# Model
maxlen: 50
num_blocks: 1
num_heads: 4
embedding_dim: 64
attn_dropout_rate: 0.6
hidden_dropout_rate: 0.4
pvn_weight: 0.001
distance_metric: wasserstein

# Training
epochs: 500
batch_size: 512
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-6

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, NDCG@5, NDCG@10]
which4best: NDCG@10
