# Data
root: ../../data
dataset: Yelp2019_550_S3Rec

# Model
maxlen: 50
num_heads: 4
num_blocks: 2
embedding_dim: 64
dropout_rate: 0.3
mask_ratio: 0.5

# Training
epochs: 500
batch_size: 256
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-6

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
