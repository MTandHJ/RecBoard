# Data
root: ../../data
dataset: Amazon2014Beauty_550_LOU

# Model
maxlen: 50
num_layers: 3
embedding_dim: 64
dropout_rate: 0.7

# Training
lr: 1.e-3
epochs: 100
batch_size: 512
optimizer: adamw
weight_decay: 1.e-6

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
