# Data
root: ../../data
dataset: Yelp2018_10104811_ROU

# Model
embedding_dim: 64
num_layers: 3
scaling_factor: 5.
alpha: 1.5
beta: 0.5
weight4mid: 0.

# Training
lr: 1.e-3
weight_decay: 1.e-3
optimizer: adam
epochs: 1000
batch_size: 2048

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
