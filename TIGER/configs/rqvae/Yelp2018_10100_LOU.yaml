# Data
root: ../../data
dataset: Yelp2018_10100_LOU
tasktag: NEXTITEM
sem_feat_file: sentence-t5-xl_item_name_categories_city.pkl

# Model
num_codewords: 256
num_codebooks: 3
codebook_dim: 32
hidden_dims: 512,256,128
apply_shared_codebook: false
sk_epsilons: 0.,0.,0.03
sk_iters: 50
commit_weight: 0.5
dropout_rate: 0.1

# Training
epochs: 10000
batch_size: 4096
optimizer: AdamW
lr: 1.e-3
weight_decay: 0.0

# Evaluation
eval_freq: 100
CHECKPOINT_FREQ: 100
which4best: PPL
