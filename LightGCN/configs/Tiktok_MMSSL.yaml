# Data
root: ../../data
dataset: Tiktok_MMSSL

# Model
embedding_dim: 64
num_layers: 3

# Training
epochs: 50
batch_size: 2048
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-3
eval_freq: 1

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
