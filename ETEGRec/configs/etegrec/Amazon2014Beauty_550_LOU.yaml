# Data
root: ../../data
dataset: Amazon2014Beauty_550_LOU
tasktag: NEXTITEM
sem_feat_file: ../../data/Amazon2014Beauty_550_LOU/sentence-t5-xl_title_categories_brand.pkl

# Model
maxlen: 20
num_codebooks: 3
num_codewords: 256
codebook_dim: 128
hidden_dims: 512,256
quant_loss_weight: 1.0
commit_weight: 0.25
kmeans_init: false
kmeans_iters: 100
tokenizer_dropout_rate: 0.0
rqvae_path: null

# T5
embedding_dim: 128
attention_size: 64
intermediate_size: 512
num_heads: 4
num_layers: 6
num_decoder_layers: 6
dropout_rate: 0.1
activation_function: relu
feed_forward_proj: relu
n_positions: 210

# Training
epochs: 400
batch_size: 512
weight_decay: 0.05
lr_rec: 5.e-3
lr_id: 1.e-4
lr_scheduler_type: cosine
warmup_steps: 8000
cycle: 2
warm_epoch: 10
finetune_epochs: 100
finetune_lr: 5.e-4

# Loss weights
id_vq_loss: 1.0
id_code_loss: 0.0
id_kl_loss: 1.e-4
id_dec_cl_loss: 3.e-4
rec_vq_loss: 0.0
rec_code_loss: 1.0
rec_kl_loss: 1.e-4
rec_dec_cl_loss: 3.e-4
sim: cos

# Evaluation
num_beams: 20
eval_freq: 2
ranking: full
monitors: [LOSS, Recall@1, Recall@5, NDCG@5, Recall@10, NDCG@10]
which4best: NDCG@10
