# Data
root: ../../data
dataset: Amazon2014Beauty_550_LOU
tasktag: NEXTITEM
sem_feat_file: sentence-t5-xl_title_categories_brand.pkl

# Model
maxlen: 20
semantic_hidden_size: 768
code_num: 256
code_length: 4
num_emb_list: 256,256,256
e_dim: 32
layers: 512,256,128
alpha: 1.0
commit_weight: 0.5
apply_shared_codebook: false
sk_epsilons: 0.,0.,0.
sk_iters: 50
kmeans_init: false
kmeans_iters: 100
dropout_prob: 0.1
rqvae_path: checkpoints/vanilla.pt

# T5
embedding_dim: 128
attention_size: 64
intermediate_size: 256
num_heads: 4
num_layers: 6
num_decoder_layers: 6
dropout_rate: 0.1
activation_function: relu
feed_forward_proj: relu

# Training
epochs: 400
batch_size: 512
weight_decay: 1.e-2
lr_rec: 5.e-4
lr_id: 5.e-4
cycle: 4
warm_epoch: 10
finetune_epochs: 0

# Loss weights
base_auxiliary_loss: 1.e-3
id_vq_loss: 1.0
id_code_loss: 0.0
id_kl_loss: 1.0
id_dec_cl_loss: 1.0
rec_vq_loss: 0.0
rec_code_loss: 1.0
rec_kl_loss: 1.0
rec_dec_cl_loss: 1.0
sim: cos

# Evaluation
num_beams: 10
eval_freq: 12
ranking: full
monitors: [LOSS, Recall@1, Recall@5, NDCG@5, Recall@10, NDCG@10]
which4best: NDCG@10
