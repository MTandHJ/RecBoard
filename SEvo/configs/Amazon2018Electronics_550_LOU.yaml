# Data
root: ../../data
dataset: Amazon2018Electronics_550_LOU

# Model
maxlen: 50
num_heads: 1
num_blocks: 2
embedding_dim: 64
dropout_rate: 0.
loss: BCE
L: 3
aggr: neumann
beta3: 0.99
H: 1
maxlen4graph: 50

# Training
epochs: 200
batch_size: 2048
lr: 1.e-3
weight_decay: 0.1
optimizer: AdamWSEvo

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
