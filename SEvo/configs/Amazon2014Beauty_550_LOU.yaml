# Data
root: ../../data
dataset: Amazon2014Beauty_550_LOU

# Model
maxlen: 50
num_heads: 1
num_blocks: 2
embedding_dim: 64
dropout_rate: 0.3
beta1: 0.9
beta2: 0.98
loss: BCE
L: 3
aggr: neumann
beta3: 0.99
H: 1
maxlen4graph: 50

# Training
epochs: 200
batch_size: 512
lr: 1.e-3
weight_decay: 0.1
optimizer: AdamWSEvo

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, NDCG@5, NDCG@10]
which4best: NDCG@10
