# Data
root: ../../data
dataset: MovieLens1M_550_LOU

# Model
maxlen: 200
num_heads: 1
num_blocks: 2
embedding_dim: 64
dropout_rate: 0.1
beta1: 0.9
beta2: 0.98
loss: BCE
L: 3
aggr: neumann
beta3: 0.99
H: 1
maxlen4graph: 200

# Training
epochs: 200
batch_size: 128
lr: 1.e-3
weight_decay: 0.1
optimizer: AdamWSEvo

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
