# Data
root: ../../data
dataset: Amazon2014Clothing_550_MMRec

# Model
embedding_dim: 64
num_layers: 1
dropout_rate: 0.4
second_l: 2.
reg_weight: 2.
vfile: visual_modality.pkl
tfile: textual_modality.pkl
afile: Null

# Training
epochs: 500
batch_size: 2048
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-5

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
