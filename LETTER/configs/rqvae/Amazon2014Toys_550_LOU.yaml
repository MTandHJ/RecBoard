# Data
root: ../../data
dataset: Amazon2014Toys_550_LOU
tasktag: NEXTITEM
sem_feat_file: sentence-t5-xl_title_categories_brand.pkl
collab_feat_file: ...

# Model
num_codewords: 256
num_codebooks: 4
codebook_dim: 32
hidden_dims: 512,256,128
apply_kmeans_init: true
sk_epsilons: 0.,0.,0.,0.003
sk_iters: 50

# Training
epochs: 20000
batch_size: 1024
optimizer: AdamW
lr: 1.e-4
weight_decay: 0.01
dropout_rate: 0.1
cf_weight: 0.01
commit_weight: 0.5
diversity_weight: 0.0001

# Evaluation
eval_freq: 100
CHECKPOINT_FREQ: 100
which4best: PPL
