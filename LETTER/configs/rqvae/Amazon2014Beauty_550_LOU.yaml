# Data
root: ../../data
dataset: Amazon2014Beauty_550_LOU
tasktag: NEXTITEM
sem_feat_file: sentence-t5-xl_title_categories_brand.pkl
collab_feat_file: ./collab/SASRec/Amazon2014Beauty_550_LOU/1222103121/sasrec-Amazon2014Beauty_550_LOU.pkl

# Model
num_codewords: 256
num_codebooks: 4
codebook_dim: 32
hidden_dims: 512,256,128
apply_kmeans_init: true
sk_epsilons: 0.,0.,0.,0.003
sk_iters: 50

# Training
epochs: 20000
batch_size: 1024
optimizer: AdamW
lr: 1.e-3
weight_decay: 0.1
dropout_rate: 0.
cf_weight: 0.01
commit_weight: 1.
diversity_weight: 0.0001

# Evaluation
eval_freq: 100
CHECKPOINT_FREQ: 100
which4best: PPL
