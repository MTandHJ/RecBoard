# Data
root: ../../data
dataset: Amazon2014Sports_550_LOU

# Model
maxlen: 50
embedding_dim: 64
num_blocks: 2
num_heads: 1
hidden_act: gelu
hidden_dropout_rate: 0.5
attn_dropout_rate: 0.5
loss: CE
alpha: 0.7
c: 5

# Training
epochs: 200
batch_size: 256
optimizer: adam
lr: 5.e-4
weight_decay: 1.e-4

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
