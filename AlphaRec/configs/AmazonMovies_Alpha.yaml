# Data
root: ../../data
dataset: AmazonMovies_Alpha
tasktag: Matching

# Model
embedding_dim: 64
num_layers: 2
tau: 0.15
num_negs: 256
projector: mlp

# Training
epochs: 500
batch_size: 4096
optimizer: adam
lr: 5.e-4
weight_decay: 1.e-6

# Evaluation
monitors: [LOSS, Recall@1, Recall@10, Recall@20, HitRate@10, HitRate@20, NDCG@10, NDCG@20]
which4best: Recall@20
