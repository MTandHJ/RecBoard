# Data
dataset: Yelp2018_10104811_ROU
root: ../../data

# Model
embedding_dim: 64
num_layers: 3
aug_type: ed
ssl_drop_rate: 0.2
ssl_weight: 0.1
temperature: 0.2

# Training
epochs: 1000
batch_size: 2048
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-4
eval_freq: 1

# Evaluation
monitors: [LOSS, Recall@1, Recall@10, Recall@20, NDCG@10, NDCG@20]
which4best: NDCG@20
