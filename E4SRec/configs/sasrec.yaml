# Data
root: ../../data
tasktag: NEXTITEM

# Model
maxlen: 50
num_heads: 1
num_blocks: 2
embedding_dim: 256
dropout_rate: 0.
loss: BCE

# Training
epochs: 300
batch_size: 512
optimizer: AdamW
lr: 1.e-3
weight_decay: 0.5

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
