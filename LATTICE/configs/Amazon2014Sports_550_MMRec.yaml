# Data
root: ../../data
dataset: Amazon2014Sports_550_MMRec

# Model
embedding_dim: 64
num_ui_layers: 3
num_ii_layers: 3
origin_ratio: 0.9
vfile: visual_modality.pkl
tfile: textual_modality.pkl

# Training
epochs: 500
batch_size: 2048
optimizer: adam
lr: 1.e-3
weight_decay: 1.e-7

# Evaluation
monitors: [LOSS, HitRate@1, HitRate@5, HitRate@10, HitRate@20, HitRate@50, NDCG@5, NDCG@10, NDCG@20, NDCG@50]
which4best: NDCG@10
