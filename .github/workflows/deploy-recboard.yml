name: Deploy RecBoard

on:
  push:
    branches: [master]
    paths:
      - "benchmark/**"
      - "recboard/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: recboard/package-lock.json

      - name: Install dependencies
        working-directory: recboard
        run: npm ci

      - name: Build data
        working-directory: recboard
        run: npm run build-data

      - name: Build
        working-directory: recboard
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: recboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4